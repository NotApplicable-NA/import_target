<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Importer | ClickHouse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: calc(100% - 40px);
        }

        .toast {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 0.5px solid;
            animation: toastIn 0.3s ease;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .toast.success {
            background: #eaf3de;
            border-color: #97c459;
        }

        .toast.danger {
            background: #fcebeb;
            border-color: #f09595;
        }

        .toast.warning {
            background: #faeeda;
            border-color: #fac775;
        }

        .toast.info {
            background: #e6f1fb;
            border-color: #85b7eb;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .toast-body {
            flex: 1;
            min-width: 0;
        }

        .toast-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 3px;
            line-height: 1.3;
        }

        .toast-msg {
            font-size: 13px;
            color: #5f5e5a;
            margin: 0;
            line-height: 1.5;
            word-break: break-word;
        }

        .toast.success .toast-title {
            color: #27500a;
        }

        .toast.danger .toast-title {
            color: #791f1f;
        }

        .toast.warning .toast-title {
            color: #633806;
        }

        .toast.info .toast-title {
            color: #0c447c;
        }

        .toast-close {
            background: none;
            border: none;
            cursor: pointer;
            color: #888780;
            font-size: 18px;
            line-height: 1;
            padding: 0;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .toast-close:hover {
            color: #2c2c2a;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            animation: toastBar 5s linear forwards;
        }

        .toast.success .toast-progress {
            background: #3b6d11;
        }

        .toast.danger .toast-progress {
            background: #a32d2d;
        }

        .toast.warning .toast-progress {
            background: #854f0b;
        }

        .toast.info .toast-progress {
            background: #185fa5;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        @keyframes toastBar {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }
    </style>
</head>

<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Excel to ClickHouse</h1>
                <p>Upload your data securely to the warehouse</p>
            </div>

            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="auth-section">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter username" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="upload-section">
                    <div class="file-drop-area" id="drop-area">
                        <span class="fake-btn">Choose file</span>
                        <span class="file-msg">or drag and drop here</span>
                        <input class="file-input" type="file" name="file" accept=".xlsx, .xls" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Kirim</button>
            </form>
        </div>
    </div>

    <script>
        const TOAST_ICONS = {
            success: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#3b6d11" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="#3b6d11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            danger: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#a32d2d" stroke-width="1.5"/><path d="M10 6v5M10 14.5h.01" stroke="#a32d2d" stroke-width="1.8" stroke-linecap="round"/></svg>`,
            warning: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none"><path d="M10 3.5L18 16.5H2L10 3.5z" stroke="#854f0b" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 9v3.5M10 15h.01" stroke="#854f0b" stroke-width="1.8" stroke-linecap="round"/></svg>`,
            info: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#185fa5" stroke-width="1.5"/><path d="M10 9v5M10 6.5h.01" stroke="#185fa5" stroke-width="1.8" stroke-linecap="round"/></svg>`,
        };

        const TOAST_TITLES = {
            success: 'Berhasil',
            danger: 'Error',
            warning: 'Perhatian',
            info: 'Info',
        };

        function showToast(category, message, duration = 5000) {
            const container = document.getElementById('toastContainer');
            const type = ['success', 'danger', 'warning', 'info'].includes(category) ? category : 'info';
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                ${TOAST_ICONS[type]}
                <div class="toast-body">
                    <p class="toast-title">${TOAST_TITLES[type]}</p>
                    <p class="toast-msg">${message}</p>
                </div>
                <button class="toast-close" onclick="dismissToast(this.parentElement)">×</button>
                <div class="toast-progress" style="animation-duration:${duration}ms"></div>
            `;
            container.appendChild(toast);
            setTimeout(() => dismissToast(toast), duration + 300);
        }

        function dismissToast(el) {
            if (!el || !el.isConnected) return;
            el.style.animation = 'toastOut 0.3s ease forwards';
            setTimeout(() => el.remove(), 280);
        }

        // Flash messages dari Flask
        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        {{ messages | tojson }}.forEach(([category, message]) => showToast(category, message));
        {% endif %}
        {% endwith %}

        // Drag & Drop
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.querySelector('.file-input');
        const fileMsg = document.querySelector('.file-msg');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileMsg.innerText = fileInput.files[0].name;
                dropArea.classList.add('is-active');
            }
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
        });

        ['dragenter', 'dragover'].forEach(evt =>
            dropArea.addEventListener(evt, () => dropArea.classList.add('is-active'))
        );
        ['dragleave', 'drop'].forEach(evt =>
            dropArea.addEventListener(evt, () => dropArea.classList.remove('is-active'))
        );

        dropArea.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            fileInput.files = files;
            if (files.length > 0) fileMsg.innerText = files[0].name;
        });
    </script>
</body>

</html>
